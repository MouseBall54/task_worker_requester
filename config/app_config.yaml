mock_mode: true
log_level: INFO

rabbitmq:
  host: "127.0.0.1"
  port: 5672
  username: "young"
  password: "young"
  virtual_host: "/"
  request_exchange: ""
  request_routing_key: "task.request22"
  request_queue: "task.request" #목표 큐 이름
  result_queue_base: "Q_RESULT" #받아올 큐 이름, 요청 보낼때 보내면 해당 큐이름으로 받아옴 
  heartbeat: 30
  blocked_connection_timeout: 30
  connection_attempts: 3
  retry_delay_seconds: 2.0

publish:
  default_action: "RUN_RECIPE"
  default_recipe_alias: "Default Recipe"
  default_recipe_path: "recipes/default_recipe.json"
  recipe_presets:
    - alias: "Default Recipe"
      path: "recipes/default_recipe.json"
    - alias: "Fast Recipe"
      path: "recipes/fast_recipe.json"
    - alias: "Precision Recipe"
      path: "recipes/precision_recipe.json"
  polling_interval_seconds: 5
  timeout_seconds: 300
  max_messages_per_poll: 100
  max_publish_retries: 3
  publish_retry_backoff_seconds: 1.5
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tif", ".tiff"]
  scan_mode: "direct"

ui:
  app_name: "RabbitMQ Task Tracker"
  window_width: 1480
  window_height: 900
  theme: "dark"
  font_family: "Segoe UI"
